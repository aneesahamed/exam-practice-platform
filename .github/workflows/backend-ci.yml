name: Backend CI/CD

on:
  push:
    branches: [develop]
    paths:
      - 'exam-platform-backend/**'
      - '.github/workflows/backend-ci.yml'
      - '.github/workflows/terraform-ci.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'exam-platform-backend/**'

concurrency:
  group: backend-${{ github.ref }}
  cancel-in-progress: false

env:
  AWS_REGION: 'eu-west-1'

jobs:
  # ── Build & Test ────────────────────────────────────────────────────────────
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: exam-platform-backend/package-lock.json

      - name: Install dependencies
        working-directory: exam-platform-backend
        run: npm ci

      - name: Type check
        working-directory: exam-platform-backend
        run: npx tsc --noEmit

      - name: Run tests
        working-directory: exam-platform-backend
        run: npm test -- --passWithNoTests

  # ── Deploy (reads Terraform outputs dynamically) ────────────────────────────
  deploy:
    name: Deploy — ${{ github.ref == 'refs/heads/main' && 'prod' || 'dev' }}
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    environment: ${{ github.ref == 'refs/heads/main' && 'prod' || 'dev' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: exam-platform-backend/package-lock.json

      - name: Setup AWS SAM CLI
        uses: aws-actions/setup-sam@v2
        with:
          use-installer: true

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.7.0'
          terraform_wrapper: false

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Set environment
        id: env
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "environment=prod" >> $GITHUB_OUTPUT
          else
            echo "environment=dev" >> $GITHUB_OUTPUT
          fi

      - name: Read Terraform outputs
        id: tf
        working-directory: terraform
        run: |
          terraform init -reconfigure
          echo "cognito_user_pool_arn=$(aws cognito-idp describe-user-pool \
            --user-pool-id $(terraform output -raw cognito_user_pool_id) \
            --query 'UserPool.Arn' --output text)"         >> $GITHUB_OUTPUT
          echo "questions_bucket=$(terraform output -raw questions_bucket_name)" >> $GITHUB_OUTPUT
          echo "progress_table=$(terraform output -raw progress_table_name)"     >> $GITHUB_OUTPUT
          echo "flags_table=$(terraform output -raw flags_table_name)"           >> $GITHUB_OUTPUT

      - name: Install dependencies
        working-directory: exam-platform-backend
        run: npm ci

      - name: Install esbuild globally
        run: npm install -g esbuild

      - name: SAM Build
        working-directory: exam-platform-backend
        run: sam build

      - name: SAM Deploy
        working-directory: exam-platform-backend
        run: |
          sam deploy \
            --stack-name exam-practice-platform-backend-${{ steps.env.outputs.environment }} \
            --region ${{ env.AWS_REGION }} \
            --capabilities CAPABILITY_IAM \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset \
            --resolve-s3 \
            --parameter-overrides \
              Environment=${{ steps.env.outputs.environment }} \
              CognitoUserPoolArn=${{ steps.tf.outputs.cognito_user_pool_arn }} \
              QuestionsBucketName=${{ steps.tf.outputs.questions_bucket }} \
              ProgressTableName=${{ steps.tf.outputs.progress_table }} \
              FlagsTableName=${{ steps.tf.outputs.flags_table }}
