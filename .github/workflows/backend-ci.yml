name: Backend CI/CD

on:
  push:
    branches: [main, develop]
    paths:
      - 'exam-platform-backend/**'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'exam-platform-backend/**'

# Prevent concurrent deployments to the same environment
concurrency:
  group: backend-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ── Build & Test ────────────────────────────────────────────────────────────
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: exam-platform-backend/package-lock.json

      - name: Install dependencies
        working-directory: exam-platform-backend
        run: npm ci

      - name: Type check
        working-directory: exam-platform-backend
        run: npx tsc --noEmit

      - name: Run tests
        working-directory: exam-platform-backend
        run: npm test -- --passWithNoTests

  # ── Deploy to Dev ───────────────────────────────────────────────────────────
  deploy-dev:
    name: Deploy to Dev
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
    environment: dev

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: exam-platform-backend/package-lock.json

      - name: Setup AWS SAM CLI
        uses: aws-actions/setup-sam@v2
        with:
          use-installer: true

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-west-1

      - name: SAM Build
        working-directory: exam-platform-backend
        run: sam build

      - name: SAM Deploy (Dev)
        working-directory: exam-platform-backend
        run: |
          sam deploy \
            --stack-name exam-practice-platform-backend-dev \
            --s3-bucket ${{ secrets.SAM_DEPLOY_BUCKET }} \
            --capabilities CAPABILITY_IAM \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset \
            --parameter-overrides \
              Environment=dev

  # ── Deploy to Prod ──────────────────────────────────────────────────────────
  deploy-prod:
    name: Deploy to Prod
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: prod

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: exam-platform-backend/package-lock.json

      - name: Setup AWS SAM CLI
        uses: aws-actions/setup-sam@v2
        with:
          use-installer: true

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-west-1

      - name: SAM Build
        working-directory: exam-platform-backend
        run: sam build

      - name: SAM Deploy (Prod)
        working-directory: exam-platform-backend
        run: |
          sam deploy \
            --stack-name exam-practice-platform-backend-prod \
            --s3-bucket ${{ secrets.SAM_DEPLOY_BUCKET }} \
            --capabilities CAPABILITY_IAM \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset \
            --parameter-overrides \
              Environment=prod
