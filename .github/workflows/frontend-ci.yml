name: Frontend CI/CD

on:
  push:
    branches: [develop]
    paths:
      - 'exam-platform-frontend/**'
      - '.github/workflows/frontend-ci.yml'
      - '.github/workflows/terraform-ci.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'exam-platform-frontend/**'

concurrency:
  group: frontend-${{ github.ref }}
  cancel-in-progress: false

env:
  AWS_REGION: 'eu-west-1'

jobs:
  # ── Build & Lint ────────────────────────────────────────────────────────────
  build-and-lint:
    name: Build & Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: exam-platform-frontend/package-lock.json

      - name: Install dependencies
        working-directory: exam-platform-frontend
        run: npm ci

      - name: Lint
        working-directory: exam-platform-frontend
        run: npm run lint

      - name: Type check
        working-directory: exam-platform-frontend
        run: npx tsc --noEmit

  # ── Deploy (reads Terraform outputs dynamically) ────────────────────────────
  deploy:
    name: Deploy — ${{ github.ref == 'refs/heads/main' && 'prod' || 'dev' }}
    needs: build-and-lint
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    environment: ${{ github.ref == 'refs/heads/main' && 'prod' || 'dev' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: exam-platform-frontend/package-lock.json

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.7.0'
          terraform_wrapper: false

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Set environment
        id: env
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "environment=prod" >> $GITHUB_OUTPUT
          else
            echo "environment=dev" >> $GITHUB_OUTPUT
          fi

      - name: Read Terraform outputs
        id: tf
        working-directory: terraform
        run: |
          terraform init -reconfigure
          echo "cognito_user_pool_id=$(terraform output -raw cognito_user_pool_id)"               >> $GITHUB_OUTPUT
          echo "cognito_user_pool_client_id=$(terraform output -raw cognito_user_pool_client_id)" >> $GITHUB_OUTPUT
          echo "frontend_bucket=$(terraform output -raw frontend_bucket_name)"                    >> $GITHUB_OUTPUT
          echo "cloudfront_id=$(terraform output -raw cloudfront_distribution_id)"               >> $GITHUB_OUTPUT

      - name: Get API URL from SAM stack
        id: api
        run: |
          ENV=${{ steps.env.outputs.environment }}
          API_URL=$(aws cloudformation describe-stacks \
            --stack-name exam-practice-platform-backend-${ENV} \
            --query 'Stacks[0].Outputs[?OutputKey==`ApiUrl`].OutputValue' \
            --output text 2>/dev/null || echo "")
          echo "api_url=${API_URL}" >> $GITHUB_OUTPUT

      - name: Install dependencies
        working-directory: exam-platform-frontend
        run: npm ci

      - name: Build
        working-directory: exam-platform-frontend
        run: npm run build
        env:
          VITE_API_BASE_URL:           ${{ steps.api.outputs.api_url }}
          VITE_COGNITO_USER_POOL_ID:   ${{ steps.tf.outputs.cognito_user_pool_id }}
          VITE_COGNITO_CLIENT_ID:      ${{ steps.tf.outputs.cognito_user_pool_client_id }}
          VITE_AWS_REGION:             ${{ env.AWS_REGION }}

      - name: Sync to S3
        working-directory: exam-platform-frontend
        run: |
          # Static assets — long cache (content-hashed filenames)
          aws s3 sync dist/ s3://${{ steps.tf.outputs.frontend_bucket }} \
            --delete \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "index.html"

          # index.html — never cache (always fetch fresh for SPA routing)
          aws s3 cp dist/index.html s3://${{ steps.tf.outputs.frontend_bucket }}/index.html \
            --cache-control "no-cache, no-store, must-revalidate"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ steps.tf.outputs.cloudfront_id }} \
            --paths "/*"

      - name: Print live URL
        run: |
          echo "✅ Frontend deployed to:"
          echo "https://$(aws cloudformation describe-stacks \
            --stack-name exam-practice-platform-backend-${{ steps.env.outputs.environment }} \
            --query 'Stacks[0].Outputs[?OutputKey==`ApiUrl`].OutputValue' \
            --output text 2>/dev/null || terraform output -raw cloudfront_domain_name)"
