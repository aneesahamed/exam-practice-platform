name: Frontend CI/CD

on:
  push:
    branches: [main, develop]
    paths:
      - 'exam-platform-frontend/**'
      - '.github/workflows/frontend-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'exam-platform-frontend/**'

concurrency:
  group: frontend-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ── Build & Lint ────────────────────────────────────────────────────────────
  build-and-lint:
    name: Build & Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: exam-platform-frontend/package-lock.json

      - name: Install dependencies
        working-directory: exam-platform-frontend
        run: npm ci

      - name: Lint
        working-directory: exam-platform-frontend
        run: npm run lint

      - name: Type check
        working-directory: exam-platform-frontend
        run: npx tsc --noEmit

      - name: Build (dev)
        working-directory: exam-platform-frontend
        run: npm run build
        env:
          VITE_API_BASE_URL: ${{ secrets.DEV_API_BASE_URL }}
          VITE_COGNITO_USER_POOL_ID: ${{ secrets.DEV_COGNITO_USER_POOL_ID }}
          VITE_COGNITO_CLIENT_ID: ${{ secrets.DEV_COGNITO_CLIENT_ID }}
          VITE_AWS_REGION: eu-west-1

  # ── Deploy to Dev ───────────────────────────────────────────────────────────
  deploy-dev:
    name: Deploy to Dev
    needs: build-and-lint
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
    environment: dev

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: exam-platform-frontend/package-lock.json

      - name: Install dependencies
        working-directory: exam-platform-frontend
        run: npm ci

      - name: Build
        working-directory: exam-platform-frontend
        run: npm run build
        env:
          VITE_API_BASE_URL: ${{ secrets.DEV_API_BASE_URL }}
          VITE_COGNITO_USER_POOL_ID: ${{ secrets.DEV_COGNITO_USER_POOL_ID }}
          VITE_COGNITO_CLIENT_ID: ${{ secrets.DEV_COGNITO_CLIENT_ID }}
          VITE_AWS_REGION: eu-west-1

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-west-1

      - name: Sync to S3
        working-directory: exam-platform-frontend
        run: |
          aws s3 sync dist/ s3://${{ secrets.DEV_FRONTEND_BUCKET }} \
            --delete \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "index.html"

          # index.html must not be cached — always fetch fresh
          aws s3 cp dist/index.html s3://${{ secrets.DEV_FRONTEND_BUCKET }}/index.html \
            --cache-control "no-cache, no-store, must-revalidate"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.DEV_CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"

  # ── Deploy to Prod ──────────────────────────────────────────────────────────
  deploy-prod:
    name: Deploy to Prod
    needs: build-and-lint
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: prod

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: exam-platform-frontend/package-lock.json

      - name: Install dependencies
        working-directory: exam-platform-frontend
        run: npm ci

      - name: Build
        working-directory: exam-platform-frontend
        run: npm run build
        env:
          VITE_API_BASE_URL: ${{ secrets.PROD_API_BASE_URL }}
          VITE_COGNITO_USER_POOL_ID: ${{ secrets.PROD_COGNITO_USER_POOL_ID }}
          VITE_COGNITO_CLIENT_ID: ${{ secrets.PROD_COGNITO_CLIENT_ID }}
          VITE_AWS_REGION: eu-west-1

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-west-1

      - name: Sync to S3
        working-directory: exam-platform-frontend
        run: |
          aws s3 sync dist/ s3://${{ secrets.PROD_FRONTEND_BUCKET }} \
            --delete \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "index.html"

          aws s3 cp dist/index.html s3://${{ secrets.PROD_FRONTEND_BUCKET }}/index.html \
            --cache-control "no-cache, no-store, must-revalidate"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.PROD_CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"
