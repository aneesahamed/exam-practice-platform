name: Terraform CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: terraform-${{ github.ref }}
  cancel-in-progress: false

env:
  TF_VERSION: '1.7.0'
  AWS_REGION: 'eu-west-1'
  WORKING_DIR: './terraform'

jobs:
  terraform:
    name: Terraform ${{ github.event_name == 'pull_request' && 'Plan' || 'Apply' }}
    runs-on: ubuntu-latest
    environment: ${{ github.ref == 'refs/heads/main' && 'prod' || 'dev' }}

    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}

    outputs:
      # Expose Terraform outputs so downstream jobs can consume them
      cognito_user_pool_id:        ${{ steps.outputs.outputs.cognito_user_pool_id }}
      cognito_user_pool_client_id: ${{ steps.outputs.outputs.cognito_user_pool_client_id }}
      cognito_user_pool_arn:       ${{ steps.outputs.outputs.cognito_user_pool_arn }}
      questions_bucket_name:       ${{ steps.outputs.outputs.questions_bucket_name }}
      frontend_bucket_name:        ${{ steps.outputs.outputs.frontend_bucket_name }}
      cloudfront_distribution_id:  ${{ steps.outputs.outputs.cloudfront_distribution_id }}
      cloudfront_domain_name:      ${{ steps.outputs.outputs.cloudfront_domain_name }}
      progress_table_name:         ${{ steps.outputs.outputs.progress_table_name }}
      flags_table_name:            ${{ steps.outputs.outputs.flags_table_name }}
      environment:                 ${{ steps.env.outputs.environment }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set environment
        id: env
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "environment=prod" >> $GITHUB_OUTPUT
          else
            echo "environment=dev" >> $GITHUB_OUTPUT
          fi

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Terraform Init
        run: terraform init

      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        id: plan
        run: |
          terraform plan \
            -var="environment=${{ steps.env.outputs.environment }}" \
            -out=tfplan \
            -no-color 2>&1 | tee plan_output.txt

      - name: Post plan to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('${{ env.WORKING_DIR }}/plan_output.txt', 'utf8');
            const truncated = plan.length > 60000 ? plan.substring(0, 60000) + '\n...[truncated]' : plan;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `#### Terraform Plan 📋\n\`\`\`\n${truncated}\n\`\`\`\n*Pushed by: @${{ github.actor }}*`
            });

      - name: Terraform Apply
        if: github.event_name == 'push'
        run: |
          terraform apply \
            -var="environment=${{ steps.env.outputs.environment }}" \
            -auto-approve \
            -no-color

      - name: Capture Terraform outputs
        id: outputs
        if: github.event_name == 'push'
        run: |
          echo "cognito_user_pool_id=$(terraform output -raw cognito_user_pool_id)"               >> $GITHUB_OUTPUT
          echo "cognito_user_pool_client_id=$(terraform output -raw cognito_user_pool_client_id)" >> $GITHUB_OUTPUT
          echo "cognito_user_pool_arn=$(aws cognito-idp describe-user-pool --user-pool-id $(terraform output -raw cognito_user_pool_id) --query 'UserPool.Arn' --output text)" >> $GITHUB_OUTPUT
          echo "questions_bucket_name=$(terraform output -raw questions_bucket_name)"             >> $GITHUB_OUTPUT
          echo "frontend_bucket_name=$(terraform output -raw frontend_bucket_name)"               >> $GITHUB_OUTPUT
          echo "cloudfront_distribution_id=$(terraform output -raw cloudfront_distribution_id)"   >> $GITHUB_OUTPUT
          echo "cloudfront_domain_name=$(terraform output -raw cloudfront_domain_name)"           >> $GITHUB_OUTPUT
          echo "progress_table_name=$(terraform output -raw progress_table_name)"                 >> $GITHUB_OUTPUT
          echo "flags_table_name=$(terraform output -raw flags_table_name)"                       >> $GITHUB_OUTPUT
